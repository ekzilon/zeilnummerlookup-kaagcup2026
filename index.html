<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Zeilnummer Lookup</title>
</head>

<body style="
  font-family: Arial, sans-serif;
  padding: 20px;
  max-width: 800px;
  margin: auto;
">

  <h1 style="
    font-size: 32px;
    margin-bottom: 10px;
  ">
    Vind jouw vlet met de LookUp
  </h1>

  <p style="
    color: #555;
    margin-bottom: 25px;
  ">
    Voer één of meerdere zeilnummers in.
  </p>

  <input
    id="search"
    type="text"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    placeholder="Bijv. 1427 1688 1766"
    style="
      padding: 16px;
      font-size: 20px;
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    "
  >

  <button
    onclick="searchNumber()"
    style="
      padding: 16px 24px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    "
  >
    Foto's zoeken
  </button>

  <div
    id="results"
    style="
      margin-top: 30px;
    "
  ></div>

<script>

document
  .getElementById("search")
  .addEventListener("keypress", function(event) {

    if (event.key === "Enter") {
      searchNumber();
    }
});

async function searchNumber() {

  const number =
    document.getElementById("search").value.trim();

  const resultsDiv =
    document.getElementById("results");

  if (!number) {

    resultsDiv.innerHTML =
      "Voer eerst een zeilnummer in.";

    return;
  }

  resultsDiv.innerHTML =
    "Foto's worden gezocht...";

  try {

    const response = await fetch(
      "https://ekzilon.github.io/zeilnummerlookup-kaagcup2026/lookup_with_links.json"
    );

    const data = await response.json();

    const numbers = number
      .split(/[, ]+/)
      .filter(n => n.trim() !== "");

    let html = "";

    let totalFound = 0;

    numbers.forEach(searchNumber => {

      const matches = data[searchNumber];

      if (!matches || matches.length === 0) {

        html += `
          <div style="
            margin-bottom:30px;
            padding:15px;
            border:1px solid #ddd;
            border-radius:10px;
          ">

            <h2>
              ${searchNumber}
            </h2>

            <div>
              Geen foto's gevonden.
            </div>

          </div>
        `;

        return;
      }

      totalFound += matches.length;

      html += `
        <div style="
          margin-bottom:30px;
        ">

          <h2>
            ${searchNumber}
            (${matches.length} ${
              matches.length === 1 ? "foto" : "foto's"
            })
          </h2>
      `;

      matches.forEach(photo => {

        html += `
          <div style="
            margin-bottom:15px;
            padding:15px;
            border:1px solid #ddd;
            border-radius:10px;
          ">

            <div style="
              font-weight:bold;
              margin-bottom:8px;
            ">
              ${photo.filename}
            </div>

            <a
              href="${photo.url}"
              target="_blank"
              style="
                font-size:18px;
              "
            >
              Bekijk foto
            </a>

          </div>
        `;
      });

      html += `</div>`;
    });

    if (totalFound === 0) {

      html =
        "Geen foto's gevonden.";
    }

    resultsDiv.innerHTML = html;

    resultsDiv.scrollIntoView({
      behavior: "smooth"
    });

  } catch (error) {

    resultsDiv.innerHTML =
      "Fout bij laden van database.";

    console.error(error);
  }
}

</script>

</body>
</html>
