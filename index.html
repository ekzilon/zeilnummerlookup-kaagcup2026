<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Zeilnummer Lookup</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Zeilnummer zoeken</h2>

<input
  id="search"
  type="text"
  placeholder="Voer zeilnummer in"
  style="
    padding: 10px;
    font-size: 18px;
    width: 300px;
  "
>

<button onclick="searchNumber()">
  Zoeken
</button>

<div id="results" style="margin-top: 20px;"></div>

<script>

async function searchNumber() {

  const number =
    document.getElementById("search").value.trim();

  const resultsDiv =
    document.getElementById("results");

  resultsDiv.innerHTML = "Zoeken...";

  try {
    
    const response = await fetch(
      "https://ekzilon.github.io/zeilnummerlookup-kaagcup2026/lookup_with_links.json"
    );

    const data = await response.json();

    const numbers = number
  .split(/[, ]+/)
  .filter(n => n.trim() !== "");

let html = "";

let totalFound = 0;

numbers.forEach(searchNumber => {

  const matches = data[searchNumber];

  if (!matches || matches.length === 0) {

    html += `
      <div style="margin-bottom:20px;">
        <h3>${searchNumber}</h3>
        Geen foto's gevonden.
      </div>
    `;

    return;
  }

  totalFound += matches.length;

  html += `
    <div style="margin-bottom:30px;">
      <h3>
        ${searchNumber}
        (${matches.length} foto's)
      </h3>
  `;

  matches.forEach(photo => {

    html += `
      <div style="
        margin-bottom:10px;
        padding:10px;
        border-bottom:1px solid #ccc;
      ">

        <strong>${photo.filename}</strong>

        <br>

        <a
          href="${photo.url}"
          target="_blank"
        >
          Bekijk foto
        </a>

      </div>
    `;
  });

  html += `</div>`;
});

if (totalFound === 0) {

  html = "Geen foto's gevonden.";
}

resultsDiv.innerHTML = html;

resultsDiv.scrollIntoView({
  behavior: "smooth"
});

    if (!matches || matches.length === 0) {

      resultsDiv.innerHTML =
        "Geen foto's gevonden.";

      return;
    }

    let html =
      `<h3>${matches.length} foto's gevonden:</h3>`;

    matches.forEach(photo => {

      html += `
        <div style="
          margin-bottom: 10px;
          padding: 10px;
          border-bottom: 1px solid #ccc;
        ">

          <strong>${photo.filename}</strong>

          <br>

          <a
            href="${photo.url}"
            target="_blank"
          >
            Open foto
          </a>

        </div>
      `;
    });

    resultsDiv.innerHTML = html;  resultsDiv.scrollIntoView({   behavior: "smooth" });

  } catch (error) {

    resultsDiv.innerHTML =
      "Fout bij laden database.";

    console.error(error);
  }
}

</script>

</body>
</html>
